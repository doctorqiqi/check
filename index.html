<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>旧件核对-筛选统计版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --ios-blue: #007aff; --ios-green: #34c759; --safe-top: env(safe-area-inset-top); }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: calc(var(--safe-top) + 10px) 16px 160px 16px; }
        .card { background: #fff; border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .btn-main { background: var(--ios-blue); color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; }
        
        .filter-input {
            width: 100%; border: 1px solid #d1d1d6; border-radius: 10px; padding: 12px;
            font-size: 15px; box-sizing: border-box; margin-top: 10px; background: #fff;
        }

        /* 筛选结果统计条 */
        .filter-stats {
            background: #e5f1ff; color: var(--ios-blue); padding: 8px 12px;
            border-radius: 8px; margin-top: 10px; font-size: 13px; font-weight: 600;
            display: flex; justify-content: space-between;
        }

        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; }
        
        .list-item { padding: 12px; border-bottom: 0.5px solid #eee; display: flex; flex-direction: column; gap: 4px; }
        .list-item.scanned { background: #fafff9; border-left: 6px solid var(--ios-green); }
        .item-title { font-size: 16px; font-weight: bold; color: #1c1c1e; }
        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #f0f0f2; color: #666; font-weight: 500; }
        .tag-vin { background: #333; color: #fff; font-family: monospace; }
        .tag-qty { background: #fff3cd; color: #856404; }

        #toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 16px 24px;
            border-radius: 12px; z-index: 9999; display: none; text-align: center;
            backdrop-filter: blur(8px); width: 70%; line-height: 1.5;
        }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px calc(var(--safe-bottom) + 16px); background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); border-top: 0.5px solid #d1d1d6; z-index: 100; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="card">
    <h3>📂 1. 清单导入</h3>
    <input type="file" id="excelInput" accept=".xlsx, .xls, .csv" style="display: none;">
    <button class="btn-main" onclick="document.getElementById('excelInput').click()">选择清单文件</button>
    <div id="statusLog" style="text-align:center; font-size:12px; color:#8e8e93; margin-top:8px;">未加载数据</div>
</div>

<div class="card">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3>📷 2. 扫码核对</h3>
        <b id="statText" style="color: var(--ios-blue); font-size: 20px;">0 / 0</b>
    </div>
    <button id="startBtn" class="btn-main" style="margin-top: 10px; display: none;">开启扫码并激活反馈</button>
    <div id="reader"></div>
</div>

<div class="card" style="padding: 10px 0;">
    <div style="padding: 0 15px;">
        <h3>📋 3. 核对明细</h3>
        <input type="text" id="filterInput" class="filter-input" placeholder="🔍 输入 VIN、车型或旧件号筛选...">
        <div id="filterStatsBar" class="filter-stats" style="display:none;">
            <span>当前筛选结果</span>
            <span id="filterCountDisplay">已核对 0 / 共 0 件</span>
        </div>
    </div>
    <div id="itemList" style="margin-top: 10px; max-height: 500px; overflow-y: auto;">
        <p style="text-align: center; color: #ccc; padding: 30px;">等待上传文件...</p>
    </div>
</div>

<div class="footer">
    <button class="btn-main" style="background: var(--ios-green);" onclick="exportData()">💾 导出核对报表</button>
</div>

<audio id="beepAudio" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>

<script>
    let inventory = [];
    let scanHistory = {};
    let isProcessing = false;
    const html5QrCode = new Html5Qrcode("reader");
    const beep = document.getElementById('beepAudio');

    function showToast(msg, duration = 2000) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; isProcessing = false; }, duration);
    }

    document.getElementById('filterInput').addEventListener('input', function(e) {
        renderList(e.target.value.toUpperCase());
    });

    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const ws = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(ws);
                
                const findK = (keys) => Object.keys(json[0]).find(k => keys.some(s => k.toUpperCase().includes(s)));
                
                inventory = json.map(row => ({
                    barcode: String(row[findK(['旧件条码', '条码'])] || '').trim(),
                    vin: String(row[findK(['VIN', '车架号'])] || '').trim(),
                    name: String(row[findK(['旧件名称', '名称'])] || '未知'),
                    brand: String(row[findK(['品牌'])] || '-'),
                    partNo: String(row[findK(['旧件编号', '零件号'])] || '-'),
                    qty: row[findK(['数量'])] || 1,
                    model: String(row[findK(['车型', '车系'])] || '-'),
                    original: row
                }));

                document.getElementById('statusLog').innerText = `✅ 已加载 ${inventory.length} 条数据`;
                document.getElementById('filterStatsBar').style.display = 'flex';
                renderList();
                document.getElementById('startBtn').style.display = 'block';
            } catch (err) { alert("解析失败"); }
        };
        reader.readAsArrayBuffer(file);
    });

    document.getElementById('startBtn').addEventListener('click', function() {
        beep.play().then(() => { beep.pause(); beep.currentTime = 0; });
        if (navigator.vibrate) navigator.vibrate(50);
        this.style.display = 'none';
        startScanner();
    });

    function renderList(filter = '') {
        const listDiv = document.getElementById('itemList');
        listDiv.innerHTML = '';
        
        const filtered = inventory.filter(i => 
            i.vin.includes(filter) || 
            i.model.toUpperCase().includes(filter) || 
            i.partNo.toUpperCase().includes(filter)
        );

        // 更新筛选后的总数和已核对数
        const filteredScanned = filtered.filter(i => scanHistory[i.barcode]).length;
        document.getElementById('filterCountDisplay').innerText = `已核对 ${filteredScanned} / 共 ${filtered.length} 件`;
        document.getElementById('statText').innerText = `${Object.keys(scanHistory).length} / ${inventory.length}`;

        filtered.forEach(item => {
            const isScanned = !!scanHistory[item.barcode];
            const div = document.createElement('div');
            div.className = `list-item ${isScanned ? 'scanned' : ''}`;
            div.innerHTML = `
                <div class="item-title">${item.name}</div>
                <div class="tag-row">
                    <span class="tag" style="background:#e5f1ff; color:#007aff;">${item.brand}</span>
                    <span class="tag">${item.model}</span>
                    <span class="tag tag-qty">数量:${item.qty}</span>
                </div>
                <div class="tag-row">
                    <span class="tag tag-vin">VIN:${item.vin}</span>
                </div>
                <div style="font-size:10px; color:#bbb; margin-top:2px;">编号:${item.partNo} | 条码:${item.barcode}</div>
            `;
            if (isScanned) listDiv.prepend(div); else listDiv.appendChild(div);
        });
    }

    function startScanner() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 250, height: 150 } }, (code) => {
            if(isProcessing) return;
            const clean = code.trim();
            const hit = inventory.find(i => i.barcode === clean);

            if (!hit) {
                isProcessing = true;
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                showToast(`❌ 清单无此条码\n${clean}`, 2500);
                return;
            }

            if (scanHistory[clean]) {
                isProcessing = true;
                if (navigator.vibrate) navigator.vibrate(100);
                showToast(`⚠️ 该零件已核对过`, 2000);
                return;
            }

            isProcessing = true;
            beep.play();
            if (navigator.vibrate) navigator.vibrate(80);
            scanHistory[clean] = new Date().toLocaleTimeString();
            
            // 扫描成功后刷新列表（保持当前的筛选状态）
            renderList(document.getElementById('filterInput').value.toUpperCase());
            setTimeout(() => { isProcessing = false; }, 1200);
        });
    }

    function exportData() {
        const out = inventory.map(i => ({
            ...i.original,
            "核对状态": scanHistory[i.barcode] ? "已核对" : "未扫描",
            "核对时间": scanHistory[i.barcode] || "-"
        }));
        const ws = XLSX.utils.json_to_sheet(out);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "结果");
        XLSX.writeFile(wb, `旧件报表_${new Date().getTime()}.xlsx`);
    }
</script>
</body>
</html>
